name: Auto Deploy on Server

on:
  push:
    branches:
      - deployment

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Connect and deploy on server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            echo "Pulling latest code from deployment branch..."
            cd /var/www/Business_Brokers

            git fetch origin
            git reset --hard origin/deployment
            git pull origin deployment

            echo "Installing backend dependencies..."
            cd /var/www/Business_Brokers/backend
            npm install

            echo "Restarting backend with PM2..."
            pm2 restart businessbroker-backend || pm2 start index.js --name businessbroker-backend

            echo "Installing frontend dependencies..."
            cd /var/www/Business_Brokers/frontend
            npm install

            echo "Building Next.js frontend..."
            npm run build

            echo "Restarting frontend with PM2..."
            pm2 restart businessbrokers || pm2 start npm --name businessbrokers -- start -- -p 3089

            echo "Saving PM2 process list..."
            pm2 save

            echo "Deployment complete."
