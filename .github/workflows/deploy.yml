name: Deploy — blackmont-advisory

on:
  push:
    branches:
      - deployment

jobs:
  deploy:
    name: SSH Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BLACKMONT_SERVER_HOST }}
          username: ${{ secrets.BLACKMONT_SERVER_USER }}
          key: ${{ secrets.BLACKMONT_SERVER_SSH_KEY }}
          port: 22
          command_timeout: 18m
          script: |
            set -e

            # ── 1. Pull latest code ─────────────────────────────
            echo "==> Pulling latest code..."
            cd /var/www/blackmont-advisory
            git fetch origin
            git reset --hard origin/deployment

            # ── 2. Backend ──────────────────────────────────────
            echo "==> Installing backend dependencies..."
            cd /var/www/blackmont-advisory/backend
            npm install --omit=dev

            echo "==> Restarting backend..."
            pm2 restart blackmont_backend --update-env \
              || pm2 start index.js --name blackmont_backend --cwd /var/www/blackmont-advisory/backend

            # ── 3. Frontend ─────────────────────────────────────
            echo "==> Installing frontend dependencies..."
            cd /var/www/blackmont-advisory/frontend
            npm install

            echo "==> Building Next.js frontend..."
            npm run build

            echo "==> Restarting frontend..."
            pm2 restart blackmont_frontend \
              || pm2 start npm --name blackmont_frontend --cwd /var/www/blackmont-advisory/frontend -- start

            # ── 4. Persist PM2 list ─────────────────────────────
            pm2 save

            echo "==> Deployment complete."
