name: Deploy — blackmont-advisory

on:
  push:
    branches:
      - deployment

jobs:
  deploy:
    name: SSH Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 25m
          script: |
            set -e
            cd /var/www/blackmont-advisory

            # ── 1. Snapshot HEAD before pull ───────────────────────
            PREV_COMMIT=$(git rev-parse HEAD)
            echo "==> Previous commit: $PREV_COMMIT"

            # ── 2. Pull latest deployment branch ───────────────────
            echo "==> Pulling latest code..."
            git fetch origin
            git reset --hard origin/deployment

            NEW_COMMIT=$(git rev-parse HEAD)
            echo "==> New commit:      $NEW_COMMIT"

            # ── 3. Detect what changed ─────────────────────────────
            CHANGED=$(git diff --name-only "$PREV_COMMIT" "$NEW_COMMIT")
            echo "==> Changed files:"
            echo "$CHANGED"

            BACKEND_CHANGED=false
            FRONTEND_CHANGED=false

            if echo "$CHANGED" | grep -qE '^(backend/|\.github/)'; then
              BACKEND_CHANGED=true
            fi
            if echo "$CHANGED" | grep -qE '^(frontend/|\.github/)'; then
              FRONTEND_CHANGED=true
            fi

            if [ "$PREV_COMMIT" = "$NEW_COMMIT" ]; then
              echo "==> First deploy — deploying everything."
              BACKEND_CHANGED=true
              FRONTEND_CHANGED=true
            fi

            echo "==> Backend changed:  $BACKEND_CHANGED"
            echo "==> Frontend changed: $FRONTEND_CHANGED"

            # ── 4. Backend (only if backend/ changed) ──────────────
            if [ "$BACKEND_CHANGED" = "true" ]; then
              echo ""
              echo "==> [BACKEND] Installing dependencies..."
              cd /var/www/blackmont-advisory/backend
              npm install --omit=dev

              echo "==> [BACKEND] Restarting PM2..."
              pm2 restart blackmont_backend --update-env \
                || pm2 start index.js --name blackmont_backend \
                     --cwd /var/www/blackmont-advisory/backend
              echo "==> [BACKEND] Done."
            else
              echo "==> [BACKEND] No changes — skipping."
            fi

            # ── 5. Frontend (only if frontend/ changed) ────────────
            if [ "$FRONTEND_CHANGED" = "true" ]; then
              echo ""
              echo "==> [FRONTEND] Installing dependencies..."
              cd /var/www/blackmont-advisory/frontend
              npm install

              echo "==> [FRONTEND] Rebuilding public/businessbrokers symlinks..."
              mkdir -p public/businessbrokers
              for item in public/*; do
                base=$(basename "$item")
                [ "$base" = "businessbrokers" ] && continue
                ln -sf "../$base" "public/businessbrokers/$base"
              done

              echo "==> [FRONTEND] Building Next.js..."
              npm run build

              echo "==> [FRONTEND] Restarting PM2..."
              pm2 restart blackmont_frontend \
                || pm2 start npm --name blackmont_frontend \
                     --cwd /var/www/blackmont-advisory/frontend -- start
              echo "==> [FRONTEND] Done."
            else
              echo "==> [FRONTEND] No changes — skipping."
            fi

            # ── 6. Persist PM2 list ────────────────────────────────
            pm2 save

            echo ""
            echo "==> Deployment complete."
